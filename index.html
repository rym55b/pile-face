<!DOCTYPE html>
<html lang="en">
<head>
    <title>Flip The Coin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Flip The Coin</h1>
<div>Press the coin or the button to flip the coin</div>

<section class="heads">
    <div class="cercle">$</div>
    <div class="name">Head</div>
</section>

<section class="tails" style="display:none;">
    <div class="cercle">I</div>
    <div class="name">Tail</div>
</section>

<button onclick="RandomAction()">Random</button>

<script src="script.js"></script>
</body>
</html>
